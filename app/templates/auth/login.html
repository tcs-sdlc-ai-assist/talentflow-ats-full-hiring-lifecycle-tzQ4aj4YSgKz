{% extends "base.html" %}

{% block title %}Sign In — TalentFlow ATS{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div class="text-center">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900">Sign in to your account</h1>
            <p class="mt-2 text-sm text-gray-600">
                Or
                <a href="/auth/register" class="font-medium text-primary-600 hover:text-primary-500 transition-colors">
                    create a new account
                </a>
            </p>
        </div>

        {% if error %}
        <div class="rounded-md bg-red-50 border border-red-200 p-4" role="alert">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-red-800">{{ error }}</p>
                </div>
            </div>
        </div>
        {% endif %}

        <div class="bg-white shadow-sm ring-1 ring-gray-900/5 rounded-xl p-8">
            <form class="space-y-6" method="POST" action="/auth/login">
                <div class="form-input-group">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        autocomplete="username"
                        required
                        minlength="3"
                        maxlength="32"
                        value="{{ username | default('', true) }}"
                        placeholder="Enter your username"
                        class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-gray-900 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 focus:outline-none sm:text-sm transition-colors"
                    >
                </div>

                <div class="form-input-group">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="current-password"
                        required
                        minlength="8"
                        placeholder="Enter your password"
                        class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-gray-900 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 focus:outline-none sm:text-sm transition-colors"
                    >
                </div>

                <div>
                    <button
                        type="submit"
                        class="flex w-full justify-center rounded-lg bg-primary-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors"
                    >
                        Sign in
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500">
            Don't have an account?
            <a href="/auth/register" class="font-medium text-primary-600 hover:text-primary-500 transition-colors">
                Register here
            </a>
        </p>
    </div>
</div>
{% endblock %}
